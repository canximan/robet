[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32

[rpc_endpoints]
ronin = "https://api.roninchain.com/rpc"
saigon = "https://saigon-testnet.roninchain.com/rpc"

[etherscan]
ronin = { key = "${RONIN_EXPLORER_KEY}", url = "https://explorer.roninchain.com/api" }
